<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SC Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1e1e1e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #252526;
            border-bottom: 1px solid #3e3e42;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        select {
            background: #3c3c3c;
            color: #e0e0e0;
            border: 1px solid #555;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        select:hover {
            background: #454545;
        }

        button {
            background: #007acc;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        button:hover {
            background: #005a9e;
        }

        button:active {
            background: #003d82;
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 0;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #3e3e42;
            overflow: hidden;
        }

        .panel:last-child {
            border-right: none;
        }

        .panel-header {
            background: #252526;
            border-bottom: 1px solid #3e3e42;
            padding: 12px 16px;
            font-weight: 600;
            font-size: 13px;
            color: #cccccc;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        textarea {
            flex: 1;
            background: #1e1e1e;
            color: #d4d4d4;
            border: none;
            padding: 16px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            resize: none;
            outline: none;
        }

        .code-editor {
            flex: 1;
            background: #1e1e1e;
            color: #d4d4d4;
            border: none;
            padding: 16px;
            font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
            font-size: 13px;
            line-height: 1.5;
            resize: none;
            outline: none;
            white-space: pre;
            overflow: auto;
            tab-size: 4;
            -moz-tab-size: 4;
        }

        .code-editor[contenteditable="false"] {
            user-select: text;
            cursor: text;
        }

        .code-editor[data-placeholder]:empty::before {
            content: attr(data-placeholder);
            color: #666;
            pointer-events: none;
        }

        .code-editor .hljs-comment {
            color: #6a9955;
        }

        .code-editor .hljs-keyword,
        .code-editor .hljs-literal,
        .code-editor .hljs-operator {
            color: #c586c0;
        }

        .code-editor .hljs-title,
        .code-editor .hljs-title.function_ {
            color: #dcdcaa;
        }

        .code-editor .hljs-string {
            color: #ce9178;
        }

        .code-editor .hljs-number,
        .code-editor .hljs-attr,
        .code-editor .hljs-symbol {
            color: #b5cea8;
        }

        .code-editor .hljs-built_in,
        .code-editor .hljs-type {
            color: #4ec9b0;
        }

        #scInput,
        #tsOutput {
            color: #d4d4d4;
        }

        .status {
            background: #252526;
            border-top: 1px solid #3e3e42;
            padding: 8px 16px;
            font-size: 12px;
            color: #999;
            display: none;
        }

        .status.active {
            display: block;
        }

        .status.error {
            color: #f48771;
        }

        .status.success {
            color: #6a9955;
        }

        .status.loading {
            color: #4ec9b0;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .panel {
                border-right: none;
                border-bottom: 1px solid #3e3e42;
            }

            .panel:last-child {
                border-bottom: none;
            }

            header {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }

            .controls {
                width: 100%;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>SC Converter</h1>
        <div class="controls">
            <select id="gameSelect">
                <option value="gta3">GTA III</option>
                <option value="vc">Vice City</option>
            </select>
            <button id="copyBtn">Copy Output</button>
        </div>
    </header>

    <div class="container">
        <div class="panel">
            <div class="panel-header">SC Input</div>
            <div id="scInput" class="code-editor" contenteditable="true" spellcheck="false" data-placeholder="Paste your GTA3script (.sc) code here..."></div>
        </div>

        <div class="panel">
            <div class="panel-header">TypeScript Output</div>
            <div id="tsOutput" class="code-editor" contenteditable="false" spellcheck="false"></div>
            <div id="status" class="status"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/languages/typescript.min.js"></script>
    <script src="converter.js"></script>
    <script>
        const scInput = document.getElementById('scInput');
        const tsOutput = document.getElementById('tsOutput');
        const gameSelect = document.getElementById('gameSelect');
        const copyBtn = document.getElementById('copyBtn');
        const status = document.getElementById('status');

        let tsOutputText = '';
        let conversionTimeout;
        let converterReady = false;
        let renderingSc = false;

        function log(operation, message, data = null) {
            const timestamp = new Date().toISOString().split('T')[1];
            if (data !== null) {
                console.log(`[${timestamp}] ${operation}: ${message}`, data);
            } else {
                console.log(`[${timestamp}] ${operation}: ${message}`);
            }
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function registerGta3ScriptLanguage() {
            if (!window.hljs || window.hljs.getLanguage('gta3script')) {
                log('HLJS', 'GTA3Script language already registered or highlight.js not available');
                return;
            }
            const start = performance.now();
            window.hljs.registerLanguage('gta3script', (hljs) => {
                const controlKeywords = [
                    'MISSION_START', 'MISSION_END', 'SCRIPT_START', 'SCRIPT_END',
                    'IF', 'IFNOT', 'WHILE', 'WHILENOT', 'ELSE', 'ENDIF', 'ENDWHILE',
                    'REPEAT', 'ENDREPEAT', 'SWITCH', 'CASE', 'DEFAULT', 'BREAK', 'ENDSWITCH',
                    'AND', 'OR', 'NOT', 'GOTO', 'GOSUB', 'RETURN', 'TERMINATE_THIS_SCRIPT'
                ].join(' ');

                const storageKeywords = [
                    'VAR_INT', 'VAR_FLOAT', 'VAR_TEXT_LABEL', 'VAR_TEXT_LABEL16',
                    'LVAR_INT', 'LVAR_FLOAT', 'LVAR_TEXT_LABEL', 'LVAR_TEXT_LABEL16'
                ].join(' ');

                return {
                    name: 'GTA3Script',
                    case_insensitive: true,
                    keywords: {
                        keyword: `${controlKeywords} ${storageKeywords}`,
                        literal: 'ON OFF TRUE FALSE'
                    },
                    contains: [
                        hljs.C_LINE_COMMENT_MODE,
                        hljs.C_BLOCK_COMMENT_MODE,
                        {
                            className: 'title',
                            begin: /^\s*\S+:/m
                        },
                        {
                            className: 'string',
                            begin: /"/,
                            end: /"/
                        },
                        {
                            className: 'number',
                            begin: /\b(?:0x[0-9A-Fa-f-]+|-?\d+(?:\.\d+)?[fF]?)\b/
                        },
                        {
                            className: 'operator',
                            begin: /\+\+|--|==|!=|<>|<=|>=|\+=|-=|\*=|\/=|=|<|>|\+|-|\*|\//
                        },
                        {
                            className: 'built_in',
                            begin: /^\s*[A-Za-z_][A-Za-z0-9_]*(?=\s|$)/m
                        },
                        {
                            className: 'symbol',
                            begin: /\b[A-Z][A-Z0-9_]*\b/
                        }
                    ]
                };
            });
            const duration = performance.now() - start;
            log('HLJS', `GTA3Script language registered in ${duration.toFixed(2)}ms`);
        }

        function highlightCode(text, language) {
            if (!window.hljs) return escapeHtml(text);
            const start = performance.now();
            try {
                const result = window.hljs.highlight(text, { language, ignoreIllegals: true }).value;
                const duration = performance.now() - start;
                log('HIGHLIGHT', `${language} highlighting completed in ${duration.toFixed(2)}ms for ${text.length} chars`);
                return result;
            } catch (e) {
                const duration = performance.now() - start;
                log('HIGHLIGHT', `Error after ${duration.toFixed(2)}ms`, e);
                return escapeHtml(text);
            }
        }

        function getEditorText(el) {
            const start = performance.now();
            const raw = (el.innerText || '')
                .replace(/\r\n/g, '\n')
                .replace(/\r/g, '\n')
                .replace(/\u00A0/g, ' ')
                .replace(/\u200B/g, '');
            const duration = performance.now() - start;
            if (duration > 10) {
                log('PERF', `getEditorText took ${duration.toFixed(2)}ms for ${raw.length} chars (slow!)`);
            }
            return raw;
        }

        function getCaretOffset(el) {
            const start = performance.now();
            const sel = window.getSelection();
            if (!sel || sel.rangeCount === 0) return 0;
            const range = sel.getRangeAt(0);
            if (!el.contains(range.endContainer)) return 0;
            const pre = range.cloneRange();
            pre.selectNodeContents(el);
            pre.setEnd(range.endContainer, range.endOffset);
            const offset = pre.toString().length;
            const duration = performance.now() - start;
            if (duration > 5) {
                log('PERF', `getCaretOffset took ${duration.toFixed(2)}ms (slow!)`);
            }
            return offset;
        }

        function setCaretOffset(el, offset) {
            const start = performance.now();
            const sel = window.getSelection();
            if (!sel) return;

            const range = document.createRange();
            const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
            let consumed = 0;
            let node = walker.nextNode();

            while (node) {
                const len = node.textContent ? node.textContent.length : 0;
                if (consumed + len >= offset) {
                    range.setStart(node, Math.max(0, offset - consumed));
                    range.collapse(true);
                    sel.removeAllRanges();
                    sel.addRange(range);
                    const duration = performance.now() - start;
                    if (duration > 5) {
                        log('PERF', `setCaretOffset took ${duration.toFixed(2)}ms (slow!)`);
                    }
                    return;
                }
                consumed += len;
                node = walker.nextNode();
            }

            range.selectNodeContents(el);
            range.collapse(false);
            sel.removeAllRanges();
            sel.addRange(range);
            const duration = performance.now() - start;
            if (duration > 5) {
                log('PERF', `setCaretOffset took ${duration.toFixed(2)}ms at end (slow!)`);
            }
        }

        function renderScEditor(text) {
            const start = performance.now();
            log('RENDER_SC', `Started rendering ${text.length} chars`);
            
            const wasFocused = document.activeElement === scInput;
            const caret = wasFocused ? getCaretOffset(scInput) : 0;
            const scrollTop = scInput.scrollTop;
            const scrollLeft = scInput.scrollLeft;

            renderingSc = true;
            const highlightStart = performance.now();
            scInput.innerHTML = text ? highlightCode(text, 'gta3script') : '';
            const highlightDuration = performance.now() - highlightStart;
            log('RENDER_SC', `Highlight + innerHTML took ${highlightDuration.toFixed(2)}ms`);
            
            renderingSc = false;

            if (wasFocused) setCaretOffset(scInput, caret);
            scInput.scrollTop = scrollTop;
            scInput.scrollLeft = scrollLeft;
            
            const totalDuration = performance.now() - start;
            log('RENDER_SC', `Total render time: ${totalDuration.toFixed(2)}ms`);
        }

        function renderTsEditor(text) {
            const start = performance.now();
            log('RENDER_TS', `Started rendering ${text.length} chars`);
            
            const highlightStart = performance.now();
            tsOutput.innerHTML = text ? highlightCode(text, 'typescript') : '';
            const highlightDuration = performance.now() - highlightStart;
            log('RENDER_TS', `Highlight + innerHTML took ${highlightDuration.toFixed(2)}ms`);
            
            const totalDuration = performance.now() - start;
            log('RENDER_TS', `Total render time: ${totalDuration.toFixed(2)}ms`);
        }

        // Wait for converter to be ready
        function waitForConverter() {
            log('INIT', 'Waiting for converter...');
            return new Promise((resolve) => {
                if (window.scConverterReady) {
                    converterReady = true;
                    log('INIT', 'Converter already ready!');
                    resolve();
                } else {
                    const start = performance.now();
                    const checkInterval = setInterval(() => {
                        if (window.scConverterReady) {
                            converterReady = true;
                            clearInterval(checkInterval);
                            const duration = performance.now() - start;
                            log('INIT', `Converter ready after ${duration.toFixed(2)}ms`);
                            resolve();
                        }
                    }, 50);
                    setTimeout(() => {
                        clearInterval(checkInterval);
                        const duration = performance.now() - start;
                        log('INIT', `Converter check timeout after ${duration.toFixed(2)}ms, may still be loading`);
                        resolve();
                    }, 5000);
                }
            });
        }

        async function convertCode() {
            const start = performance.now();
            const code = getEditorText(scInput).trim();
            log('CONVERT', `Input code: ${code.length} chars`);

            if (!code) {
                tsOutputText = '';
                renderTsEditor('');
                status.textContent = '';
                status.classList.remove('active');
                log('CONVERT', 'Empty input, cleared output');
                return;
            }

            if (!converterReady) {
                status.textContent = 'Converter loading...';
                status.classList.add('active', 'loading');
                log('CONVERT', 'Converter not ready yet');
                return;
            }

            status.textContent = 'Converting...';
            status.classList.add('active', 'loading');
            status.classList.remove('error', 'success');
            log('CONVERT', 'Starting conversion...');

            try {
                const config = gameSelect.value;
                log('CONVERT', `Using config: ${config}`);
                
                const convertStart = performance.now();
                const output = await window.convertScToTs(code, config);
                const convertDuration = performance.now() - convertStart;
                
                log('CONVERT', `Conversion completed in ${convertDuration.toFixed(2)}ms, output: ${output.length} chars`);
                
                tsOutputText = output;
                const renderStart = performance.now();
                renderTsEditor(output);
                const renderDuration = performance.now() - renderStart;
                
                log('CONVERT', `Rendering took ${renderDuration.toFixed(2)}ms`);
                
                status.textContent = `✓ Converted successfully (${config.toUpperCase()})`;
                status.classList.add('success');
                status.classList.remove('loading');
                
                const totalDuration = performance.now() - start;
                log('CONVERT', `Total conversion cycle: ${totalDuration.toFixed(2)}ms`);
            } catch (error) {
                const message = error instanceof Error ? error.message : 'Unknown error';
                console.error('Conversion error:', error);
                log('CONVERT', `ERROR: ${message}`, error);
                tsOutputText = `// ERROR: ${message}\n// Check browser console for details`;
                renderTsEditor(tsOutputText);
                status.textContent = `Error: ${message}`;
                status.classList.add('error');
                status.classList.remove('loading');
            }
        }

        scInput.addEventListener('keydown', (event) => {
            if (event.key === 'Tab') {
                event.preventDefault();
                document.execCommand('insertText', false, '\t');
            }
        });

        scInput.addEventListener('paste', (event) => {
            const start = performance.now();
            event.preventDefault();
            const text = (event.clipboardData || window.clipboardData).getData('text');
            log('PASTE', `Pasted ${text.length} chars`);
            
            document.execCommand('insertText', false, text);
            
            const duration = performance.now() - start;
            log('PASTE', `Paste operation completed in ${duration.toFixed(2)}ms`);
        });

        scInput.addEventListener('input', () => {
            const start = performance.now();
            if (renderingSc) {
                log('INPUT', 'Skipped (currently rendering)');
                return;
            }
            
            const text = getEditorText(scInput);
            log('INPUT', `Input event fired, content: ${text.length} chars`);
            
            const renderStart = performance.now();
            renderScEditor(text);
            const renderDuration = performance.now() - renderStart;
            log('INPUT', `renderScEditor took ${renderDuration.toFixed(2)}ms`);
            
            clearTimeout(conversionTimeout);
            log('INPUT', 'Scheduling conversion with 500ms delay');
            conversionTimeout = setTimeout(() => {
                log('INPUT', 'Conversion timeout triggered');
                convertCode();
            }, 500);
            
            const totalDuration = performance.now() - start;
            log('INPUT', `Total input handler time: ${totalDuration.toFixed(2)}ms`);
        });

        gameSelect.addEventListener('change', () => {
            log('GAME_SELECT', `Game changed to: ${gameSelect.value}`);
            status.classList.remove('active');
            convertCode();
        });

        copyBtn.addEventListener('click', async () => {
            const start = performance.now();
            const text = tsOutputText;
            log('COPY', `Copy clicked, text size: ${text.length} chars`);
            
            if (!text) {
                log('COPY', 'No text to copy');
                return;
            }

            try {
                await navigator.clipboard.writeText(text);
                const duration = performance.now() - start;
                log('COPY', `Successfully copied to clipboard in ${duration.toFixed(2)}ms`);
                
                const originalText = copyBtn.textContent;
                copyBtn.textContent = 'Copied!';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            } catch (error) {
                const duration = performance.now() - start;
                log('COPY', `Error after ${duration.toFixed(2)}ms`, error);
                status.textContent = 'Failed to copy to clipboard';
                status.classList.add('active', 'error');
            }
        });

        // Initialize converter
        const initStart = performance.now();
        log('INIT', 'Starting page initialization');
        waitForConverter().then(() => {
            registerGta3ScriptLanguage();
            status.textContent = '';
            status.classList.remove('active');
            renderScEditor('');
            renderTsEditor('');
            const initDuration = performance.now() - initStart;
            log('INIT', `Page initialization complete in ${initDuration.toFixed(2)}ms`);
            log('INIT', '=== SC Converter Ready ===');
        });
    </script>
</body>
</html>
